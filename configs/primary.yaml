experiment:
  name: primary
  seeds: 15
  seed_start: 101
  policies:
  - cvar_safe
  - hpa_like
  - keda_style
  - rule_based
  - pid
  - predictive
simulation:
  duration_intervals: 1200
  decision_interval_seconds: 1.0
  window_intervals: 8
  warmup_intervals: 120
  activation_delay_intervals: 2
  baseline_arrival_rate: 150.0
  sinusoidal_amplitude: 0.3
  sinusoidal_period_intervals: 600
  burst_count: 11
  burst_multiplier_min: 1.5
  burst_multiplier_max: 3.0
  burst_duration_min: 5
  burst_duration_max: 20
  service_mean_ms: 55.0
  service_sigma: 0.6
  per_replica_capacity_rps: 100.0
  sample_requests_per_interval: 180
  min_replicas: 2
  max_replicas: 20
  initial_replicas: 2
  slo_ms: 500.0
  cooldown_intervals: 3
  queue_threshold: 90.0
  cvar_alpha: 0.95
  cvar_budget_factor: 0.50
  ema_beta: 0.3
  pressure_threshold: 0.1
  p99_safety_factor: 1.1
  bottleneck_mode: app
  fault:
    enabled: false
  cpu_utilization_factor: 0.50
  cvar_safe_down_utilization: 0.20
  baseline_low_streak_intervals: 2
  pid_target_factor: 0.75
  pid_kp: 2.4
  pid_ki: 0.18
  pid_kd: 0.45
  pid_integral_clip: 5.0
  pid_up_threshold: 1.0
  pid_down_threshold: -1.0
output:
  directory: results/generated
