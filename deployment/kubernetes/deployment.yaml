apiVersion: apps/v1
kind: Deployment
metadata:
  name: latency-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: latency-demo
  template:
    metadata:
      labels:
        app: latency-demo
    spec:
      containers:
        - name: api
          image: cvar-safe-demo:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
